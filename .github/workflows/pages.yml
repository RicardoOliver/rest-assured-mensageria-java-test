name: pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Generate JaCoCo (unit tests)
        run: mvn -B -ntp test jacoco:report

      - name: Assemble site
        run: |
          rm -rf public
          mkdir -p public
          cp -R site/* public/
          if [ -d target/site ]; then cp -R target/site/* public/; fi
          cp -R docs public/docs
          cp -R grafana public/grafana
          cp -R prometheus public/prometheus
          cp docker-compose.yml public/docker-compose.yml
          cp docker-compose.monitoring.yml public/docker-compose.monitoring.yml

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
