name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Docker Compose (for Testcontainers Local Compose)
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Install Trivy
        run: |
          set -euo pipefail
          TRIVY_VERSION="0.56.1"
          curl -sSfL -o trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tar.gz trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          trivy --version

      - name: Vulnerability Scan (Critical Gate)
        run: trivy fs --severity CRITICAL --exit-code 1 --no-progress --format sarif --output trivy.sarif .

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Run Tests + Coverage Gate
        run: mvn -B -ntp verify -Pci,it

