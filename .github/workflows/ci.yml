name: ci

# ──────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 2 * * *"   # regression diária — 02:00 UTC
    - cron: "0 */6 * * *" # smoke a cada 6h

# ──────────────────────────────────────────────────────────────
# Variáveis globais
# ──────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx2g -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ──────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────
jobs:

  # ────────────────────────────────────────────────────────────
  # 1. Define qual tipo de teste executar
  # ────────────────────────────────────────────────────────────
  define-test-type:
    name: 🎯 Define Test Strategy
    runs-on: ubuntu-latest
    outputs:
      type: ${{ steps.test_type.outputs.type }}
    steps:
      - name: Define Test Type
        id: test_type
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "Branch: ${{ github.ref_name }}"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 2 * * *" ]]; then
              echo "type=regression" >> $GITHUB_OUTPUT
              echo "🔁 Strategy: REGRESSION (daily 02:00 UTC)"
            else
              echo "type=smoke" >> $GITHUB_OUTPUT
              echo "💨 Strategy: SMOKE (every 6h)"
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "type=pr" >> $GITHUB_OUTPUT
            echo "🔀 Strategy: PR validation"
          else
            echo "type=full" >> $GITHUB_OUTPUT
            echo "🚀 Strategy: FULL pipeline (push)"
          fi

  # ────────────────────────────────────────────────────────────
  # 2. Build + Testes + Cobertura
  # ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test & Coverage — [${{ needs.define-test-type.outputs.type }}]
    runs-on: ubuntu-latest
    needs: define-test-type

    permissions:
      contents: write
      security-events: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 🐋 Verify Docker
        run: docker version

      - name: 🐋 Pre-pull Docker images
        run: |
          docker pull rabbitmq:3.13-management  &
          docker pull postgres:16-alpine        &
          docker pull maven:3.9.9-eclipse-temurin-17 &
          docker pull eclipse-temurin:17-jre    &
          wait
          echo "✅ All images pulled"

      # ── Execução inteligente ──────────────────────────────
      - name: 🏃 Run Tests
        id: run_tests
        run: |
          TYPE="${{ needs.define-test-type.outputs.type }}"
          echo "▶️  Running test type: $TYPE"

          BASE_FLAGS="-B -ntp -e -Dmaven.test.failure.ignore=true"

          case "$TYPE" in
            regression)
              echo "➡️ FULL regression + integration tests"
              mvn $BASE_FLAGS clean verify -Pci,it
              ;;
            smoke)
              echo "➡️ SMOKE tests only"
              mvn $BASE_FLAGS clean test -Psmoke
              ;;
            pr)
              echo "➡️ PR validation (unit + fast integration)"
              mvn $BASE_FLAGS clean test -Pci
              ;;
            full)
              echo "➡️ FULL pipeline (unit + integration + verify)"
              mvn $BASE_FLAGS clean verify -Pci,it
              ;;
          esac

      # ── Geração de cobertura JaCoCo ───────────────────────
      # FIX: goal 'jacoco:report-integration' não existe — usar 'jacoco:report'
      #      com -Djacoco.dataFile apontando para o .exec correto.
      #      O parâmetro correto via CLI é -Djacoco.outputDirectory (não -DoutputDirectory).
      - name: 📊 Generate JaCoCo Reports
        if: always()
        run: |
          echo "=== Verificando exec files ==="
          ls -lah target/jacoco/ 2>/dev/null || echo "⚠️  target/jacoco/ não encontrado"

          # Unit report
          if [ -f target/jacoco/jacoco.exec ]; then
            echo "✅ jacoco.exec encontrado ($(wc -c < target/jacoco/jacoco.exec) bytes)"
            mvn -B -ntp jacoco:report \
              -Djacoco.dataFile=target/jacoco/jacoco.exec \
              -Djacoco.outputDirectory=target/site/jacoco \
              || echo "⚠️  jacoco:report unit falhou"
          else
            echo "❌ jacoco.exec não encontrado — unit report não gerado"
          fi

          # Integration report — goal correto: jacoco:report (não jacoco:report-integration)
          if [ -f target/jacoco/jacoco-it.exec ]; then
            echo "✅ jacoco-it.exec encontrado ($(wc -c < target/jacoco/jacoco-it.exec) bytes)"
            mvn -B -ntp jacoco:report \
              -Djacoco.dataFile=target/jacoco/jacoco-it.exec \
              -Djacoco.outputDirectory=target/site/jacoco-it \
              || echo "⚠️  jacoco IT report falhou"
          else
            echo "ℹ️  jacoco-it.exec não encontrado — IT report ignorado"
          fi

      # ── Geração de relatórios HTML Surefire/Failsafe ──────
      # FIX: target/surefire-reports/ contém apenas XMLs — o browser não renderiza XML.
      #      É necessário executar surefire-report:report-only e failsafe-report-only
      #      para gerar os HTMLs em target/site/ antes de copiar para site/.
      - name: 📝 Generate Surefire & Failsafe HTML Reports
        if: always()
        run: |
          if [ -d target/surefire-reports ] && ls target/surefire-reports/TEST-*.xml 1>/dev/null 2>&1; then
            echo "✅ Gerando Surefire HTML Report..."
            mvn -B -ntp surefire-report:report-only -DshowSuccess=true \
              || echo "⚠️  surefire-report:report-only falhou"
          else
            echo "ℹ️  Nenhum XML de surefire encontrado — HTML não gerado"
          fi

          if [ -d target/failsafe-reports ] && ls target/failsafe-reports/TEST-*.xml 1>/dev/null 2>&1; then
            echo "✅ Gerando Failsafe HTML Report..."
            mvn -B -ntp surefire-report:failsafe-report-only \
              || echo "⚠️  surefire-report:failsafe-report-only falhou"
          else
            echo "ℹ️  Nenhum XML de failsafe encontrado — HTML não gerado"
          fi

      # ── Diagnóstico de artefatos ──────────────────────────
      - name: 🔍 Diagnose Build Artifacts
        if: always()
        run: |
          echo "=== target/ ==="
          ls -lah target/ 2>/dev/null || echo "target/ não encontrado"

          echo "=== target/jacoco/ ==="
          ls -lah target/jacoco/ 2>/dev/null || echo "target/jacoco/ não encontrado"

          echo "=== target/site/ ==="
          find target/site/ -name "index.html" 2>/dev/null | sort || echo "target/site/ não encontrado"

          echo "=== Surefire XMLs ==="
          ls -lah target/surefire-reports/ 2>/dev/null || echo "surefire-reports não encontrado"

          echo "=== Failsafe XMLs ==="
          ls -lah target/failsafe-reports/ 2>/dev/null || echo "failsafe-reports não encontrado"

          echo "=== Surefire HTML ==="
          ls -lah target/site/surefire-report.html 2>/dev/null || echo "surefire-report.html não encontrado"

          echo "=== Failsafe HTML ==="
          ls -lah target/site/failsafe-report.html 2>/dev/null || echo "failsafe-report.html não encontrado"

          if [ -f target/jacoco/jacoco.exec ]; then
            echo "✅ jacoco.exec: $(wc -c < target/jacoco/jacoco.exec) bytes"
          fi
          if [ -f target/jacoco/jacoco-it.exec ]; then
            echo "✅ jacoco-it.exec: $(wc -c < target/jacoco/jacoco-it.exec) bytes"
          fi

      # ── Validar resultado dos testes ─────────────────────
      - name: 🚦 Validate Test Results
        if: always()
        run: |
          FAILED=0

          if ls target/surefire-reports/TEST-*.xml 2>/dev/null | head -1 | grep -q .; then
            FAILURES=$(grep -r 'failures="[^0]"\|errors="[^0]"' target/surefire-reports/ 2>/dev/null | wc -l || echo 0)
            if [[ "$FAILURES" -gt 0 ]]; then
              echo "❌ Encontradas $FAILURES falhas nos testes unitários!"
              FAILED=1
            else
              echo "✅ Testes unitários: PASSED"
            fi
          fi

          if ls target/failsafe-reports/TEST-*.xml 2>/dev/null | head -1 | grep -q .; then
            IT_FAILURES=$(grep -r 'failures="[^0]"\|errors="[^0]"' target/failsafe-reports/ 2>/dev/null | wc -l || echo 0)
            if [[ "$IT_FAILURES" -gt 0 ]]; then
              echo "❌ Encontradas $IT_FAILURES falhas nos testes de integração!"
              FAILED=1
            else
              echo "✅ Testes de integração: PASSED"
            fi
          fi

          exit $FAILED

      # ── Preparar site para GitHub Pages ──────────────────
      # FIX: todos os diretórios agora garantem um index.html válido.
      #      Surefire/Failsafe copiam o HTML gerado (não os XMLs brutos).
      #      CSS e imagens do Maven site são copiados junto para não quebrar o estilo.
      - name: 📄 Prepare Reports Site
        if: always()
        run: |
          mkdir -p site/jacoco site/jacoco-it site/surefire site/failsafe

          # ── JaCoCo Unit ───────────────────────────────────
          if [ -d target/site/jacoco ] && [ -f target/site/jacoco/index.html ]; then
            cp -r target/site/jacoco/. site/jacoco/
            echo "✅ JaCoCo unit report copiado"
          else
            echo "❌ JaCoCo unit: index.html não encontrado"
            echo "<h2>JaCoCo Unit Report não disponível neste run</h2>" > site/jacoco/index.html
          fi

          # ── JaCoCo IT ─────────────────────────────────────
          if [ -d target/site/jacoco-it ] && [ -f target/site/jacoco-it/index.html ]; then
            cp -r target/site/jacoco-it/. site/jacoco-it/
            echo "✅ JaCoCo IT report copiado"
          else
            echo "ℹ️  JaCoCo IT: index.html não encontrado"
            echo "<h2>JaCoCo IT Report não disponível neste run</h2>" > site/jacoco-it/index.html
          fi

          # ── Surefire HTML (gerado por surefire-report:report-only) ──
          if [ -f target/site/surefire-report.html ]; then
            cp target/site/surefire-report.html site/surefire/index.html
            # Copia assets do Maven site para o estilo funcionar
            [ -d target/site/css ]    && cp -r target/site/css/.    site/surefire/css/    || true
            [ -d target/site/images ] && cp -r target/site/images/. site/surefire/images/ || true
            echo "✅ Surefire HTML copiado"
          else
            echo "❌ surefire-report.html não encontrado"
            echo "<h2>Surefire Report não disponível neste run</h2>" > site/surefire/index.html
          fi

          # ── Failsafe HTML (gerado por surefire-report:failsafe-report-only) ──
          if [ -f target/site/failsafe-report.html ]; then
            cp target/site/failsafe-report.html site/failsafe/index.html
            [ -d target/site/css ]    && cp -r target/site/css/.    site/failsafe/css/    || true
            [ -d target/site/images ] && cp -r target/site/images/. site/failsafe/images/ || true
            echo "✅ Failsafe HTML copiado"
          else
            echo "ℹ️  Failsafe report não disponível"
            echo "<h2>Failsafe Report não disponível neste run</h2>" > site/failsafe/index.html
          fi

          # ── Index principal ───────────────────────────────
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>Test Reports</title>
            <style>
              body { font-family: sans-serif; padding: 2rem; max-width: 640px; }
              h1   { margin-bottom: 1.5rem; }
              a    { display: block; margin: .75rem 0; font-size: 1.1rem; text-decoration: none; color: #0969da; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>📊 Test Reports</h1>
            <a href="jacoco/index.html">🔵 JaCoCo Coverage — Unit Tests</a>
            <a href="jacoco-it/index.html">🟣 JaCoCo Coverage — Integration Tests</a>
            <a href="surefire/index.html">🧪 Surefire (Unit Tests)</a>
            <a href="failsafe/index.html">🔗 Failsafe (Integration Tests)</a>
          </body>
          </html>
          EOF
          echo "✅ index.html gerado"

          echo "=== Estrutura final do site/ ==="
          find site/ -name "index.html" | sort

      # ── Upload de artefatos ───────────────────────────────
      - name: 📦 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ needs.define-test-type.outputs.type }}-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            target/site/**
            target/surefire-reports/**
            target/failsafe-reports/**
            target/jacoco/**

      - name: 📦 Upload Site Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 7
          path: site/

  # ────────────────────────────────────────────────────────────
  # 3. Security Scan (Trivy)
  # ────────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: define-test-type

    permissions:
      contents: read
      security-events: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 🛡️ Install Trivy
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates curl gnupg lsb-release
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/trivy.gpg
          sudo chmod a+r /etc/apt/keyrings/trivy.gpg
          echo "deb [signed-by=/etc/apt/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          trivy --version

      # ── Scan filesystem ───────────────────────────────────
      - name: 🔍 Trivy FS Scan (SARIF)
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --no-progress \
            --format sarif \
            --output trivy-fs.sarif \
            .
          echo "✅ FS scan concluído"

      - name: 📤 Upload Trivy FS SARIF
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # ── Build da imagem Docker ────────────────────────────
      - name: 🐋 Docker Build
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            -t app:${{ github.sha }} \
            .
          echo "✅ Imagem construída: app:${{ github.sha }}"

      # ── Scan da imagem ────────────────────────────────────
      - name: 🔍 Trivy Image Scan (SARIF)
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --no-progress \
            --format sarif \
            --output trivy-image.sarif \
            app:${{ github.sha }}
          echo "✅ Image scan (SARIF) concluído"

      - name: 📤 Upload Trivy Image SARIF
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # ── Gate de vulnerabilidades críticas ─────────────────
      - name: 🚨 Vulnerability Gate (CRITICAL — exit 1)
        run: |
          trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            --no-progress \
            app:${{ github.sha }}

  # ────────────────────────────────────────────────────────────
  # 4. Deploy para GitHub Pages (só na main)
  # ────────────────────────────────────────────────────────────
  deploy-pages:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' && always()

    permissions:
      contents: write

    steps:
      - name: 📥 Download Site Artifact
        uses: actions/download-artifact@v4
        with:
          name: site-${{ github.run_number }}
          path: ./site

      # FIX: atualizado de @v3 (deprecada) para @v4
      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          commit_message: "📊 Deploy test reports — run #${{ github.run_number }} [${{ github.sha }}]"

  # ────────────────────────────────────────────────────────────
  # 5. Notificação de status final
  # ────────────────────────────────────────────────────────────
  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [define-test-type, test, security-scan]
    if: always()

    steps:
      - name: 📊 Print Summary
        run: |
          echo "## 📋 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 Test Strategy | \`${{ needs.define-test-type.outputs.type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test Job | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔀 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔖 SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏃 Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Relatório de cobertura disponível em GitHub Pages após deploy na \`main\`." >> $GITHUB_STEP_SUMMARY
