name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Docker Compose (for Testcontainers Local Compose)
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Vulnerability Scan (Critical Gate)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"

      - name: Run Tests + Coverage Gate
        run: mvn -B -ntp verify -Pci,it

