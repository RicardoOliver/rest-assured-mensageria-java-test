name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Docker Compose (for Testcontainers Local Compose)
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
      
      - name: Run Tests + Coverage Gate
        run: mvn -B -ntp verify -Pci,it

      - name: Trivy FS Scan (SARIF)
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Upload Trivy FS SARIF
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Docker Build (app image)
        run: docker build -t app:${{ github.sha }} .

      - name: Trivy Scan (SARIF)
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: image
          image-ref: app:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Upload Trivy Image SARIF
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Vulnerability Scan (Critical Gate)
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: image
          image-ref: app:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"

