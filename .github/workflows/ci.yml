name: ci

on:
  push:
  pull_request:
  schedule:
    # 🌙 Regressão completa (todo dia às 02:00 UTC → 23:00 Brasil)
    - cron: "0 2 * * *"

    # 🔁 Smoke tests a cada 6 horas
    - cron: "0 */6 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 necessário para publicar no Pages
      security-events: write

    steps:
      # 🔽 Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Setup Java + cache Maven
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # 🐳 Garantir Docker
      - name: Ensure Docker available
        run: docker version

      # ⚡ Pre-pull (otimização de tempo)
      - name: Pre-pull Docker images
        run: |
          docker pull rabbitmq:3.13-management
          docker pull postgres:16-alpine
          docker pull maven:3.9.9-eclipse-temurin-17
          docker pull eclipse-temurin:17-jre

      # 🧠 Detectar tipo de execução
      - name: Define Test Type
        id: test_type
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 2 * * *" ]]; then
              echo "type=regression" >> $GITHUB_OUTPUT
            else
              echo "type=smoke" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "type=pr" >> $GITHUB_OUTPUT
          else
            echo "type=full" >> $GITHUB_OUTPUT
          fi

      # 🔐 Instalar Trivy (segurança)
      - name: Install Trivy
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg lsb-release
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /etc/apt/keyrings/trivy.gpg
          sudo chmod a+r /etc/apt/keyrings/trivy.gpg
          echo "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      # 🧪 Execução inteligente dos testes
      - name: Run Tests + Coverage Gate
        run: |
          TYPE="${{ steps.test_type.outputs.type }}"
          echo "Running test type: $TYPE"

          if [[ "$TYPE" == "regression" ]]; then
            echo "➡️ Running FULL regression"
            mvn -B -ntp -e verify -Pci,it

          elif [[ "$TYPE" == "smoke" ]]; then
            echo "➡️ Running SMOKE tests"
            mvn -B -ntp -e test -Psmoke

          elif [[ "$TYPE" == "pr" ]]; then
            echo "➡️ Running PR validation tests"
            mvn -B -ntp -e test -Pci

          else
            echo "➡️ Running FULL pipeline"
            mvn -B -ntp -e verify -Pci,it
          fi

      # 📊 🔥 NOVO — preparar JaCoCo para Pages
      - name: Prepare JaCoCo report for Pages
        if: always()
        run: |
          mkdir -p site/jacoco
          cp -r target/site/jacoco/* site/jacoco/ || true

      # 🔍 Debug cobertura (sempre roda)
      - name: Debug JaCoCo IT exec
        if: always()
        run: |
          ls -lah target || true
          ls -lah target/jacoco || true
          wc -c target/jacoco/jacoco-it.exec || true

      # 📦 Upload de relatórios
      - name: Upload Test Reports (Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          if-no-files-found: warn
          retention-days: 14
          path: |
            docker-compose.yml
            docker-compose.monitoring.yml
            prometheus/**
            grafana/**
            target/site/**
            target/surefire-reports/**
            target/failsafe-reports/**
            target/jacoco/**

      # 🔐 Scan de filesystem (Trivy)
      - name: Trivy FS Scan (SARIF)
        run: trivy fs --severity CRITICAL --exit-code 0 --no-progress --format sarif --output trivy-fs.sarif .

      - name: Upload Trivy FS SARIF
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # 🐳 Build da imagem
      - name: Docker Build (app image)
        run: docker build -t app:${{ github.sha }} .

      # 🔐 Scan da imagem (informativo)
      - name: Trivy Image Scan (Report)
        run: trivy image --severity CRITICAL --exit-code 0 --no-progress --format sarif --output trivy-image.sarif app:${{ github.sha }}

      - name: Upload Trivy Image SARIF
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # 🚨 Gate de segurança (bloqueia pipeline)
      - name: Vulnerability Scan (Critical Gate)
        run: trivy image --severity CRITICAL --exit-code 1 --no-progress app:${{ github.sha }}

      # 🚀 🔥 NOVO — Deploy GitHub Pages
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
